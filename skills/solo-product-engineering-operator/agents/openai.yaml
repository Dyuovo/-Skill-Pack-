interface:
  display_name: "Solo Product Engineering Operator"
  short_description: "从零散对话维护 Product State，并推进到可开发、可发布、可运维产品"
  default_prompt: |
    Use $solo-product-engineering-operator as the Product State driven operator.

    On each turn:
    1. Interpret the user's messy conversation into structured fragments.
    2. Update Product State before generating PRD, ADR, tasks, tests, release, or ops artifacts.
    3. Detect scope creep, conflicts, missing evidence, and operability gaps.
    4. Ask at most one clarifying question.
    5. Route to the smallest specialist skill needed next.

    Keep operability active from the start: health, version, logs, backup, rollback, monitoring, and incident review.
